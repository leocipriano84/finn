<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach IA — Finn</title>
<link rel="stylesheet" href="/lib/app.css">
<style>
  .coach-layout { display: flex; height: calc(100vh - 0px); overflow: hidden; }

  /* History sidebar */
  .history-sidebar { width: 240px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  @media (max-width: 700px) { .history-sidebar { display: none; } }
  .history-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .history-title { font-weight: 700; font-size: 14px; margin-bottom: 12px; }
  .history-list { flex: 1; overflow-y: auto; padding: 8px; }
  .history-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: background 0.15s; }
  .history-item:hover { background: rgba(255,255,255,0.04); }
  .history-item.active { background: rgba(0,245,160,0.08); }
  .history-item-title { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px; }
  .history-item-date { font-size: 11px; color: var(--muted); }

  /* Chat area */
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .coach-info { flex: 1; }
  .coach-name-hdr { font-weight: 700; font-size: 15px; }
  .coach-status { font-size: 12px; color: var(--green); display: flex; align-items: center; gap: 4px; }
  .status-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }

  .messages-wrap { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .message { display: flex; gap: 10px; align-items: flex-start; max-width: 85%; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .msg-avatar.ai { background: linear-gradient(135deg, var(--green), var(--blue)); color: var(--bg); }
  .msg-avatar.user { background: #1a1a2a; color: var(--muted); }
  .msg-content { flex: 1; }
  .msg-bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
  .msg-bubble.ai { background: rgba(0,245,160,0.08); border: 1px solid rgba(0,245,160,0.15); border-bottom-left-radius: 4px; color: var(--text); }
  .msg-bubble.user { background: #1a1a2a; border: 1px solid var(--border); border-bottom-right-radius: 4px; color: var(--text); }
  .msg-time { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .message.user .msg-time { text-align: right; }
  .msg-actions { display: flex; gap: 4px; margin-top: 6px; opacity: 0; transition: opacity 0.15s; }
  .message:hover .msg-actions { opacity: 1; }
  .msg-action { background: none; border: none; color: var(--muted); cursor: pointer; padding: 3px 6px; border-radius: 6px; font-size: 12px; transition: all 0.15s; }
  .msg-action:hover { background: rgba(255,255,255,0.08); color: var(--text); }

  /* Typing indicator */
  .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 12px 16px; }
  .typing-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: typing 1.4s infinite ease-in-out; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Quick actions */
  .quick-actions { padding: 12px 20px; display: flex; gap: 8px; flex-wrap: wrap; border-top: 1px solid rgba(26,26,42,0.5); }
  .quick-btn { background: rgba(0,245,160,0.06); border: 1px solid rgba(0,245,160,0.15); color: var(--green); padding: 7px 12px; border-radius: 100px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
  .quick-btn:hover { background: rgba(0,245,160,0.12); }

  /* Input */
  .chat-input-wrap { padding: 12px 20px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .chat-input-row { display: flex; gap: 10px; align-items: flex-end; }
  .chat-input { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; resize: none; max-height: 120px; transition: border-color 0.2s; line-height: 1.5; }
  .chat-input:focus { border-color: var(--green); }
  .chat-input::placeholder { color: #3d3d4a; }
  .send-btn { background: linear-gradient(135deg, var(--green), var(--blue)); border: none; color: var(--bg); width: 42px; height: 42px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.2s; flex-shrink: 0; }
  .send-btn:hover { box-shadow: 0 0 16px rgba(0,245,160,0.3); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .char-count { font-size: 11px; color: var(--muted); text-align: right; margin-top: 4px; }

  /* Paywall */
  .paywall { text-align: center; padding: 40px 24px; }
  .paywall-icon { font-size: 52px; margin-bottom: 16px; }
  .paywall-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; margin-bottom: 10px; }
  .paywall-text { color: var(--muted); font-size: 15px; margin-bottom: 28px; line-height: 1.6; max-width: 400px; margin-left: auto; margin-right: auto; }
  .insight-card { background: var(--card); border: 1px solid rgba(0,245,160,0.2); border-radius: 14px; padding: 16px; margin-bottom: 12px; text-align: left; }
  .insight-label { font-size: 10px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .insight-text { font-size: 13px; line-height: 1.5; }
</style>
</head>
<body>
<div class="app-wrap">
  <aside class="sidebar">
    <a href="/dashboard.html" class="sidebar-logo"><div class="logo-icon">F</div><span class="logo-text">finn</span></a>
    <nav class="sidebar-nav">
      <a href="/dashboard.html" class="nav-item"><span class="nav-icon">🏠</span>Dashboard</a>
      <a href="/transactions.html" class="nav-item"><span class="nav-icon">💳</span>Transações</a>
      <a href="/goals.html" class="nav-item"><span class="nav-icon">🎯</span>Metas</a>
      <a href="/reports.html" class="nav-item"><span class="nav-icon">📊</span>Relatórios</a>
      <a href="/coach.html" class="nav-item active"><span class="nav-icon">🤖</span>Coach IA</a>
      <a href="/referrals.html" class="nav-item"><span class="nav-icon">🎁</span>Indicações</a>
      <a href="/profile.html" class="nav-item"><span class="nav-icon">👤</span>Perfil</a>
      <a href="/help.html" class="nav-item"><span class="nav-icon">❓</span>Ajuda</a>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-info"><div class="user-avatar" id="sidebarAvatar">?</div><div><div class="user-name" id="sidebarName">...</div><div class="user-plan" id="sidebarPlan">Plano Grátis</div></div></div>
      <button class="btn-logout" onclick="FinnAuth.logout()">Sair</button>
    </div>
  </aside>

  <main class="main-content" style="padding:0;">
    <div class="coach-layout">

      <!-- History -->
      <div class="history-sidebar">
        <div class="history-header">
          <div class="history-title">Conversas</div>
          <button class="btn btn-secondary btn-sm w-full" onclick="newConversation()" style="width:100%;">+ Nova conversa</button>
        </div>
        <div class="history-list" id="historyList">
          <div class="history-item active"><div class="history-item-title">Conversa atual</div><div class="history-item-date">Agora</div></div>
        </div>
      </div>

      <!-- Chat -->
      <div class="chat-area">
        <div class="chat-header">
          <div class="msg-avatar ai" style="width:40px;height:40px;font-size:18px;">F</div>
          <div class="coach-info">
            <div class="coach-name-hdr">Coach Finn</div>
            <div class="coach-status"><div class="status-dot"></div>Disponível</div>
          </div>
        </div>

        <div class="messages-wrap" id="messagesWrap" style="display:none;"></div>
        <div id="paywallArea" style="flex:1;overflow-y:auto;padding:20px;"></div>

        <div id="chatControls" style="display:none;">
          <div class="quick-actions" id="quickActions">
            <button class="quick-btn" onclick="sendQuick('Como posso reduzir meus gastos este mês?')">💸 Reduzir gastos</button>
            <button class="quick-btn" onclick="sendQuick('Analise meu mês financeiro')">📊 Analisar mês</button>
            <button class="quick-btn" onclick="sendQuick('Me ajude a criar uma meta de poupança')">🎯 Criar meta</button>
            <button class="quick-btn" onclick="sendQuick('Onde estou gastando mais do que deveria?')">🔍 Onde estou gastando</button>
          </div>

          <div class="chat-input-wrap">
            <div class="chat-input-row">
              <textarea class="chat-input" id="chatInput" placeholder="Pergunte ao Finn..." rows="1" maxlength="1000" oninput="autoResize(this);updateCharCount()" onkeydown="handleKey(event)"></textarea>
              <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
            <div class="char-count" id="charCount">0 / 1000</div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<nav class="bottom-nav">
  <div class="bottom-nav-wrap">
    <a href="/dashboard.html" class="bnav-item"><span class="bnav-icon">🏠</span>Início</a>
    <a href="/transactions.html" class="bnav-item"><span class="bnav-icon">💳</span>Lançamentos</a>
    <a href="/goals.html" class="bnav-item"><span class="bnav-icon">🎯</span>Metas</a>
    <a href="/reports.html" class="bnav-item"><span class="bnav-icon">📊</span>Relatórios</a>
    <a href="/coach.html" class="bnav-item active"><span class="bnav-icon">🤖</span>Coach</a>
    <a href="/profile.html" class="bnav-item"><span class="bnav-icon">👤</span>Perfil</a>
  </div>
</nav>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/lib/auth.js"></script>
<script>
  let messages = [];
  let isPro = false;

  async function init() {
    const session = await FinnAuth.checkAuth();
    if (!session) return;
    try {
      const r = await FinnAuth.apiCall('/api/auth/login');
      const p = await r.json();
      FinnUI.setNavUser(p.name, p.plan);
      isPro = p.plan === 'pro';
    } catch { FinnUI.setNavUser(session.user.user_metadata?.name, null); }

    if (isPro) {
      document.getElementById('messagesWrap').style.display = 'flex';
      document.getElementById('chatControls').style.display = 'block';
      document.getElementById('paywallArea').style.display = 'none';
      addWelcomeMessage();
    } else {
      renderPaywall();
    }
  }

  function addWelcomeMessage() {
    addMessage('assistant', `Olá! 👋 Sou o Finn, seu coach financeiro pessoal.

Posso te ajudar a entender seus padrões de gastos, identificar oportunidades de economia e criar estratégias personalizadas para suas metas.

**O que você gostaria de explorar hoje?**`);
  }

  function renderPaywall() {
    const el = document.getElementById('paywallArea');
    el.innerHTML = `
      <div class="paywall">
        <div class="paywall-icon">🤖</div>
        <h2 class="paywall-title">Coach IA Finn</h2>
        <p class="paywall-text">Converse com um coach financeiro que conhece seus dados, entende seus padrões e te dá orientações 100% personalizadas.</p>
        <div style="max-width:400px;margin:0 auto 28px;">
          <div class="insight-card">
            <div class="insight-label">💡 Preview — Insight do seu perfil</div>
            <div class="insight-text" id="previewInsight">Carregando seu insight...</div>
          </div>
          <div class="insight-card">
            <div class="insight-label">🎯 Meta sugerida</div>
            <div class="insight-text">Com base nos seus gastos atuais, você pode economizar R$200-400/mês ajustando apenas 2 categorias.</div>
          </div>
          <div class="insight-card">
            <div class="insight-label">📊 Padrão identificado</div>
            <div class="insight-text">Seus gastos tendem a aumentar nos fins de semana. O Coach pode te ajudar a criar um plano para isso.</div>
          </div>
        </div>
        <a href="/api/stripe/checkout" class="btn btn-primary" style="font-size:15px;padding:14px 28px;" onclick="startCheckout(event)">Ativar Coach Pro — R$19/mês</a>
        <div style="margin-top:12px;font-size:12px;color:var(--muted);">Cancele quando quiser · 7 dias grátis para testar</div>
      </div>`;

    // Load preview insight
    FinnAuth.apiCall('/api/dashboard/summary').then(r => r.json()).then(data => {
      document.getElementById('previewInsight').textContent = data.insight || 'Registre transações para ver seu insight personalizado.';
    }).catch(() => {});
  }

  async function startCheckout(e) {
    e.preventDefault();
    try {
      const res = await FinnAuth.apiCall('/api/stripe/checkout', { method: 'POST' });
      const data = await res.json();
      if (data.url) window.location.href = data.url;
    } catch { FinnUI.toast('Erro ao iniciar checkout', 'error'); }
  }

  function addMessage(role, content) {
    messages.push({ role, content });
    const wrap = document.getElementById('messagesWrap');
    const isUser = role === 'user';
    const el = document.createElement('div');
    el.className = `message ${isUser ? 'user' : ''}`;
    el.innerHTML = `
      <div class="msg-avatar ${role}">${isUser ? '👤' : 'F'}</div>
      <div class="msg-content">
        <div class="msg-bubble ${role}">${renderMarkdown(content)}</div>
        <div class="msg-time">${new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}</div>
        ${!isUser ? `<div class="msg-actions"><button class="msg-action" onclick="copyMsg(this)" title="Copiar">📋</button></div>` : ''}
      </div>`;
    wrap.appendChild(el);
    wrap.scrollTop = wrap.scrollHeight;
    return el;
  }

  function renderMarkdown(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/`(.*?)`/g, '<code style="background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:4px;font-size:13px;">$1</code>')
      .replace(/\n/g, '<br>');
  }

  function showTyping() {
    const wrap = document.getElementById('messagesWrap');
    const el = document.createElement('div');
    el.className = 'message';
    el.id = 'typingIndicator';
    el.innerHTML = `<div class="msg-avatar ai">F</div><div class="msg-bubble ai"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
    wrap.appendChild(el);
    wrap.scrollTop = wrap.scrollHeight;
    return el;
  }

  function removeTyping() {
    document.getElementById('typingIndicator')?.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || !isPro) return;

    input.value = '';
    autoResize(input);
    updateCharCount();
    document.getElementById('sendBtn').disabled = true;

    addMessage('user', text);
    const typing = showTyping();

    try {
      const history = messages.slice(-20).map(m => ({ role: m.role, content: m.content }));
      const res = await FinnAuth.apiCall('/api/coach', {
        method: 'POST',
        body: { message: text, history: history.slice(0, -1) }
      });
      removeTyping();
      if (!res.ok) {
        const e = await res.json();
        throw new Error(e.error || 'Erro');
      }
      const data = await res.json();
      addMessage('assistant', data.reply);
    } catch (e) {
      removeTyping();
      addMessage('assistant', `Desculpe, ocorreu um erro: ${e.message}. Tente novamente.`);
    }
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  function sendQuick(text) {
    document.getElementById('chatInput').value = text;
    sendMessage();
  }

  function copyMsg(btn) {
    const bubble = btn.closest('.msg-content').querySelector('.msg-bubble');
    navigator.clipboard.writeText(bubble.innerText);
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = '📋', 1500);
  }

  function newConversation() {
    messages = [];
    document.getElementById('messagesWrap').innerHTML = '';
    addWelcomeMessage();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function updateCharCount() {
    const len = document.getElementById('chatInput').value.length;
    document.getElementById('charCount').textContent = `${len} / 1000`;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  init();
</script>
</body>
</html>
